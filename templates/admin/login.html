<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — NutriAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --green-600: #16a34a; --green-50: #f0fdf4; --slate-900: #0f172a;
      --slate-700: #334155; --slate-200: #e2e8f0; --slate-100: #f1f5f9;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a2f 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .logo-icon {
      width: 64px; height: 64px;
      background: var(--green-50);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 14px;
      border: 2px solid #86efac;
    }
    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; color: var(--slate-900); margin-bottom: 4px;
    }
    .login-logo .subtitle {
      font-size: 0.82rem; color: #64748b; font-weight: 500;
      background: #f1f5f9; padding: 4px 12px; border-radius: 100px;
      display: inline-block;
    }
    .form-label { font-size: 0.85rem; font-weight: 600; color: var(--slate-700); }
    .form-control {
      border: 1.5px solid var(--slate-200);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .form-control:focus {
      border-color: var(--green-600);
      box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
    }
    .input-icon-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: #94a3b8; font-size: 1rem;
    }
    .input-icon-wrap .form-control { padding-left: 38px; }
    .btn-login {
      background: linear-gradient(135deg, var(--green-600), #15803d);
      color: #fff; border: none; border-radius: 100px;
      padding: 13px; font-weight: 700; font-size: 1rem;
      width: 100%; transition: all 0.2s;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(22,163,74,0.35);
      color: #fff;
    }
    .error-alert {
      background: #fef2f2; border: 1px solid #fca5a5;
      color: #991b1b; border-radius: 10px;
      padding: 10px 14px; font-size: 0.85rem;
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .back-link {
      text-align: center; margin-top: 20px;
      font-size: 0.82rem; color: #94a3b8;
    }
    .back-link a { color: var(--green-600); font-weight: 600; }
    .security-note {
      background: #fefce8; border: 1px solid #fde68a;
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.78rem; color: #78350f; margin-top: 20px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .toggle-password { cursor: pointer; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🛡️</div>
      <h1>Admin Portal</h1>
      <span class="subtitle">NutriAI Administration</span>
    </div>

    {% if error %}
    <div class="error-alert">
      <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <i class="bi bi-person-fill input-icon"></i>
          <input type="text" class="form-control" name="username"
                 placeholder="Enter admin username" autocomplete="username" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap" style="position:relative;">
          <i class="bi bi-lock-fill input-icon"></i>
          <input type="password" class="form-control" name="password" id="passField"
                 placeholder="Enter admin password" autocomplete="current-password" required>
          <i class="bi bi-eye toggle-password" id="togglePass" onclick="togglePassword()"></i>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-shield-lock me-2"></i>Sign In to Admin Panel
      </button>
    </form>

    <div class="security-note">
      <i class="bi bi-info-circle-fill" style="flex-shrink:0;margin-top:1px"></i>
      <span>This area is restricted to authorized administrators only. All access is logged.</span>
    </div>

    <div class="back-link">
      <a href="{{ url_for('index') }}"><i class="bi bi-arrow-left me-1"></i>Back to NutriAI</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePassword() {
      const f = document.getElementById('passField');
      const i = document.getElementById('togglePass');
      if (f.type === 'password') { f.type = 'text'; i.className = 'bi bi-eye-slash toggle-password'; }
      else { f.type = 'password'; i.className = 'bi bi-eye toggle-password'; }
    }
  </script>
</body>
</html>
