<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline — NutriAI</title>
  <meta name="description" content="NutriAI — offline page">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#16a34a">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #16a34a;
      --green-d: #14532d;
      --bg:      #0f172a;
      --bg2:     #1e293b;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --border:  rgba(255,255,255,0.08);
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .offline-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .offline-card::before {
      content: '';
      position: absolute;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(22,163,74,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .offline-icon {
      font-size: 72px;
      margin-bottom: 8px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .offline-wifi {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .offline-wifi svg {
      color: var(--muted);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #4ade80, #16a34a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .offline-desc {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .offline-features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
    }

    .offline-feature {
      background: rgba(22,163,74,0.08);
      border: 1px solid rgba(22,163,74,0.2);
      border-radius: 12px;
      padding: 14px 12px;
      font-size: 0.82rem;
      color: #86efac;
    }
    .offline-feature-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

    .offline-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-primary-pwa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn-primary-pwa:hover {
      background: linear-gradient(135deg, #15803d, #166534);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(22,163,74,0.35);
    }
    .btn-secondary-pwa {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn-secondary-pwa:hover {
      border-color: rgba(22,163,74,0.4);
      color: #86efac;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
      text-decoration: none;
      color: var(--text);
    }
    .brand-icon { font-size: 1.5rem; }
    .brand-name {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #4ade80, #16a34a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #f87171;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      margin-right: 6px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .offline-status {
      display: inline-flex;
      align-items: center;
      font-size: 0.78rem;
      color: #f87171;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 20px;
      padding: 4px 10px;
      margin-bottom: 24px;
    }

    @media (max-width: 480px) {
      .offline-card { padding: 40px 24px; }
      .offline-features { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <a href="/" class="brand">
      <span class="brand-icon">🥗</span>
      <span class="brand-name">NutriAI</span>
    </a>

    <div class="offline-status">
      <span class="status-dot"></span>
      No internet connection
    </div>

    <div class="offline-icon">📡</div>

    <h1>You're Offline</h1>
    <p class="offline-desc">
      Don't worry! NutriAI is a Progressive Web App — your previously
      viewed diet plans and key pages are still accessible while offline.
    </p>

    <div class="offline-features">
      <div class="offline-feature">
        <span class="offline-feature-icon">📋</span>
        Cached diet plans
      </div>
      <div class="offline-feature">
        <span class="offline-feature-icon">📊</span>
        Progress charts
      </div>
      <div class="offline-feature">
        <span class="offline-feature-icon">🥗</span>
        Meal summaries
      </div>
      <div class="offline-feature">
        <span class="offline-feature-icon">💡</span>
        Nutrition tips
      </div>
    </div>

    <div class="offline-btns">
      <button class="btn-primary-pwa" onclick="window.location.reload()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        Try Again
      </button>
      <button class="btn-secondary-pwa" onclick="history.back()">
        ← Go Back
      </button>
    </div>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
